<link rel="stylesheet" href="components/section-logs.css">
<!-- Logs Section -->
<section id="logs" class="section" aria-labelledby="logs-title">
    <h2 id="logs-title" data-i18n="logs.title">实时日志</h2>
    <div class="request-logs-panel">
        <div class="request-logs-header">
            <h3 data-i18n="logs.request.title">请求日志</h3>
            <div class="request-logs-actions">
                <button class="btn btn-secondary" id="refreshRequestLogs" aria-label="Refresh Request Logs">
                    <i class="fas fa-sync-alt" aria-hidden="true"></i> <span data-i18n="logs.request.refresh">刷新</span>
                </button>
                <button class="btn btn-secondary" id="downloadRequestLogsCsv" aria-label="Download Request Logs CSV">
                    <i class="fas fa-file-csv" aria-hidden="true"></i> <span data-i18n="logs.request.downloadCsv">导出 CSV</span>
                </button>
                <button class="btn btn-secondary" id="downloadRequestLogsJson" aria-label="Download Request Logs JSON">
                    <i class="fas fa-file-code" aria-hidden="true"></i> <span data-i18n="logs.request.downloadJson">导出 JSON</span>
                </button>
            </div>
        </div>

        <div class="request-logs-stats" id="requestLogsStats">
            <div class="request-stat-card">
                <span class="request-stat-label" data-i18n="logs.request.stats.total">总请求</span>
                <span class="request-stat-value" id="requestStatTotal">0</span>
            </div>
            <div class="request-stat-card">
                <span class="request-stat-label" data-i18n="logs.request.stats.success">成功</span>
                <span class="request-stat-value success" id="requestStatSuccess">0</span>
            </div>
            <div class="request-stat-card">
                <span class="request-stat-label" data-i18n="logs.request.stats.failed">失败</span>
                <span class="request-stat-value error" id="requestStatFailed">0</span>
            </div>
            <div class="request-stat-card">
                <span class="request-stat-label" data-i18n="logs.request.stats.retry">重试请求</span>
                <span class="request-stat-value warn" id="requestStatRetry">0</span>
            </div>
            <div class="request-stat-card">
                <span class="request-stat-label" data-i18n="logs.request.stats.avgDuration">平均耗时</span>
                <span class="request-stat-value" id="requestStatAvgDuration">--</span>
            </div>
            <div class="request-stat-card">
                <span class="request-stat-label" data-i18n="logs.request.stats.totalTokens">总 Token</span>
                <span class="request-stat-value" id="requestStatTotalTokens">--</span>
            </div>
        </div>

        <div class="request-logs-filters">
            <select id="requestLogStatusFilter" class="form-control">
                <option value="all" data-i18n="logs.request.status.all">全部状态</option>
                <option value="running" data-i18n="logs.request.status.running">进行中</option>
                <option value="success" data-i18n="logs.request.status.success">成功</option>
                <option value="error" data-i18n="logs.request.status.error">失败</option>
            </select>
            <input type="text" id="requestLogProviderFilter" class="form-control" data-i18n-placeholder="logs.request.filters.provider" placeholder="按 Provider 筛选">
            <input type="text" id="requestLogAccountFilter" class="form-control" data-i18n-placeholder="logs.request.filters.account" placeholder="按账号筛选">
            <input type="text" id="requestLogSearchFilter" class="form-control" data-i18n-placeholder="logs.request.filters.search" placeholder="搜索 requestId/模型/路径/错误">
            <input type="datetime-local" id="requestLogDateFrom" class="form-control">
            <input type="datetime-local" id="requestLogDateTo" class="form-control">
        </div>

        <div class="request-logs-table-wrapper">
            <table class="request-logs-table" id="requestLogsTable">
                <thead>
                    <tr>
                        <th data-i18n="logs.request.table.detail">详情</th>
                        <th data-i18n="logs.request.table.status">状态</th>
                        <th data-i18n="logs.request.table.account">账号</th>
                        <th data-i18n="logs.request.table.provider">Provider</th>
                        <th data-i18n="logs.request.table.model">模型</th>
                        <th data-i18n="logs.request.table.startedAt">开始时间</th>
                        <th data-i18n="logs.request.table.endedAt">结束时间</th>
                        <th data-i18n="logs.request.table.duration">耗时</th>
                        <th data-i18n="logs.request.table.tokens">Token</th>
                        <th data-i18n="logs.request.table.retryCount">重试</th>
                    </tr>
                </thead>
                <tbody id="requestLogsBody"></tbody>
            </table>
        </div>
        <div class="request-logs-empty" id="requestLogsEmpty" data-i18n="logs.request.empty">暂无请求日志</div>
    </div>

    <h3 class="system-logs-title" data-i18n="logs.system.title">系统日志</h3>
    <div class="logs-controls">
        <button class="btn btn-danger" id="clearLogs" aria-label="Clear All Logs" data-i18n-aria-label="logs.clear">
            <i class="fas fa-trash" aria-hidden="true"></i> <span data-i18n="logs.clear">清空日志</span>
        </button>
        <button class="btn btn-secondary" id="downloadLogs" aria-label="Download Today Logs" data-i18n-aria-label="logs.download">
            <i class="fas fa-download" aria-hidden="true"></i> <span data-i18n="logs.download">下载日志</span>
        </button>
        <button class="btn btn-primary" id="toggleAutoScroll" data-enabled="true" aria-label="Toggle Auto-scroll" data-i18n-aria-label="logs.autoScroll">
            <i class="fas fa-arrow-down" aria-hidden="true"></i> <span data-i18n="logs.autoScroll.on">自动滚动: 开</span>
        </button>
    </div>
    <div class="logs-container" id="logsContainer" role="log" aria-live="polite" aria-atomic="false">
        <!-- Logs will appear here -->
    </div>
</section>
